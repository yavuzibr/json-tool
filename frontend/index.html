<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header__logo">
      <span class="header__logo-bracket">{</span>
      <span class="header__logo-text">JSON Tool</span>
      <span class="header__logo-bracket">}</span>
      <span class="header__logo-badge">v2</span>
    </div>
    <div class="header__right">
      <p class="header__tagline">Analyze · Inspect · Export</p>
      <div class="theme-switch" id="themeSwitch" title="Temayı değiştir">
        <span class="theme-switch__icon">☀</span>
        <div class="theme-switch__track"><div class="theme-switch__thumb"></div></div>
        <span class="theme-switch__icon">☾</span>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="layout">

    <!-- SOL PANEL -->
    <aside class="panel panel--control">

      <!-- Girdi -->
      <section class="section">
        <h2 class="section__title">Girdi</h2>
        <div class="input-group">
          <label class="file-btn" id="fileLabel">
            <span class="file-btn__icon">▤</span>
            <span class="file-btn__text">Dosya Seç</span>
            <input type="file" id="fileInput" accept=".json" multiple hidden />
          </label>
          <label class="file-btn" id="folderLabel">
            <span class="file-btn__icon">▦</span>
            <span class="file-btn__text">Klasör Seç</span>
            <input type="file" id="folderInput" webkitdirectory hidden />
          </label>
        </div>
        <ul class="file-list" id="fileList">
          <li class="file-list__empty">Henüz dosya seçilmedi.</li>
        </ul>
      </section>

      <!-- Mod -->
      <section class="section">
        <h2 class="section__title">Mod</h2>
        <div class="mode-tabs">
          <button class="mode-tab mode-tab--active" data-mode="analyze">
            <span class="mode-tab__icon">◎</span> Analiz
          </button>
          <button class="mode-tab" data-mode="operations">
            <span class="mode-tab__icon">◈</span> İşlemler
          </button>
        </div>
      </section>

      <!-- Analiz Seçenekleri (toggle'lı) -->
      <section class="section section--options" id="analyzeOptions">
        <h2 class="section__title">Analiz Seçenekleri</h2>
        <div class="toggle-group">

          <div class="toggle-section-label">Veri Kalitesi</div>
          <label class="toggle-row is-on" data-key="nullMissing">
            <input type="checkbox" checked hidden />
            <span class="toggle-row__label">
              <span class="toggle-row__icon">⚠</span>
              <span class="toggle-row__text">Null / Missing</span>
            </span>
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row is-on" data-key="dataQuality">
            <input type="checkbox" checked hidden />
            <span class="toggle-row__label">
              <span class="toggle-row__icon">🔍</span>
              <span class="toggle-row__text">Veri Kalitesi</span>
            </span>
            <span class="toggle-switch"></span>
          </label>

          <div class="toggle-section-label">Akıllı Tespit</div>
          <label class="toggle-row is-on" data-key="patterns">
            <input type="checkbox" checked hidden />
            <span class="toggle-row__label">
              <span class="toggle-row__icon">🏷</span>
              <span class="toggle-row__text">Pattern Tespiti</span>
            </span>
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row is-on" data-key="enums">
            <input type="checkbox" checked hidden />
            <span class="toggle-row__label">
              <span class="toggle-row__icon">📑</span>
              <span class="toggle-row__text">Enum Tespiti</span>
            </span>
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row is-on" data-key="outliers">
            <input type="checkbox" checked hidden />
            <span class="toggle-row__label">
              <span class="toggle-row__icon">📉</span>
              <span class="toggle-row__text">Outlier Tespiti</span>
            </span>
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row is-on" data-key="correlations">
            <input type="checkbox" checked hidden />
            <span class="toggle-row__label">
              <span class="toggle-row__icon">🔗</span>
              <span class="toggle-row__text">Korelasyon</span>
            </span>
            <span class="toggle-switch"></span>
          </label>

          <div class="toggle-section-label">Yapısal</div>
          <label class="toggle-row is-on" data-key="fieldPresence">
            <input type="checkbox" checked hidden />
            <span class="toggle-row__label">
              <span class="toggle-row__icon">📊</span>
              <span class="toggle-row__text">Alan Varlığı</span>
            </span>
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row is-on" data-key="schemaDrift">
            <input type="checkbox" checked hidden />
            <span class="toggle-row__label">
              <span class="toggle-row__icon">↔</span>
              <span class="toggle-row__text">Schema Drift</span>
            </span>
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row is-on" data-key="jsonSchema">
            <input type="checkbox" checked hidden />
            <span class="toggle-row__label">
              <span class="toggle-row__icon">📐</span>
              <span class="toggle-row__text">JSON Schema Export</span>
            </span>
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row is-on" data-key="hierarchy">
            <input type="checkbox" checked hidden />
            <span class="toggle-row__label">
              <span class="toggle-row__icon">🌳</span>
              <span class="toggle-row__text">Hiyerarşi</span>
            </span>
            <span class="toggle-switch"></span>
          </label>

        </div>
      </section>

      <!-- İşlemler -->
      <section class="section section--options hidden" id="operationsOptions">
        <h2 class="section__title">İşlemler</h2>
        <button class="op-btn" data-op="merge"><span>⇌</span> İki JSON Merge</button>
        <button class="op-btn" data-op="trim"><span>⌁</span> 100 Obje Sonrasını Kırp</button>
        <button class="op-btn" data-op="dedupe"><span>⊘</span> Duplicate Temizle</button>
      </section>

      <div class="run-area">
        <button class="run-btn" id="runBtn">
          <span class="run-btn__text">Çalıştır</span>
          <span class="run-btn__arrow">→</span>
        </button>
      </div>

    </aside>

    <!-- SAĞ PANEL -->
    <section class="panel panel--output">

      <div class="output-header">
        <h2 class="section__title" style="margin:0">Çıktı</h2>
        <div class="output-actions">
          <button class="action-btn action-btn--schema" id="schemaBtn" disabled>Schema İndir</button>
          <button class="action-btn" id="copyBtn" disabled>Kopyala</button>
          <button class="action-btn action-btn--primary" id="exportBtn" disabled>JSON İndir</button>
        </div>
      </div>

      <!-- Boş state -->
      <div class="output-empty" id="outputEmpty">
        <div class="output-empty__icon">{ }</div>
        <p class="output-empty__text">Dosya yükle ve <strong>Çalıştır</strong>'a bas.</p>
      </div>

      <!-- Sonuç -->
      <div class="output-content hidden" id="outputContent">

        <!-- Özet kartlar -->
        <div class="result-cards" id="resultCards"></div>

        <!-- Tab bar -->
        <div class="output-tabs" id="outputTabs"></div>

        <!-- Tab paneller -->
        <div id="tabPanels" style="flex:1;overflow-y:auto"></div>

        <!-- İşlem JSON önizleme -->
        <pre class="json-preview hidden" id="jsonPreview"></pre>

      </div>

    </section>
  </main>

  <!-- STATUS BAR -->
  <footer class="statusbar">
    <div class="statusbar__dot" id="statusDot"></div>
    <span class="statusbar__item" id="statusMode">Analiz</span>
    <span class="statusbar__sep">·</span>
    <span class="statusbar__item" id="statusFiles">Dosya: —</span>
    <span class="statusbar__sep">·</span>
    <span class="statusbar__item" id="statusState">Hazır</span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
